name: Build and release

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4.7.1
        with:
          distribution: temurin
          java-version: '17'

      - uses: android-actions/setup-android@v3
        with:
          packages: 'platform-tools platforms;android-35 build-tools;35.0.0'

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties', 'gradle/libs.versions.toml') }}
          restore-keys: gradle-${{ runner.os }}-

      - name: Set versionCode to run number
        run: |
          sed -i "s/versionCode = [0-9]\+/versionCode = ${{ github.run_number }}/" app/build.gradle.kts
          grep 'versionCode' app/build.gradle.kts | head -1

      - name: Run unit tests
        run: ./gradlew testDebugUnitTest --stacktrace

      - name: Build release APK
        run: ./gradlew assembleRelease --stacktrace

      - name: Derive release tag
        id: meta
        run: |
          version=$(grep 'versionName' app/build.gradle.kts | head -1 | sed -E 's/.*"([^"]+)".*/\1/')
          short_sha=$(git rev-parse --short HEAD)
          tag="v${version}-build.${{ github.run_number }}"
          echo "version=${version}" >> "$GITHUB_OUTPUT"
          echo "tag=${tag}" >> "$GITHUB_OUTPUT"
          echo "short_sha=${short_sha}" >> "$GITHUB_OUTPUT"

      - name: Prepare release assets
        run: |
          cp app/build/outputs/apk/release/app-release.apk \
             "nock-${{ steps.meta.outputs.version }}-build.${{ github.run_number }}.apk"
          cp app/build/outputs/apk/release/app-release.apk nock-latest.apk
          echo "${{ github.run_number }}" > version.txt

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.tag }}
          name: Nock ${{ steps.meta.outputs.version }} (build ${{ github.run_number }})
          body: |
            Automated release for commit ${{ steps.meta.outputs.short_sha }}.

            Install with: `adb install nock-${{ steps.meta.outputs.version }}-build.${{ github.run_number }}.apk`

            In-app updates pull `nock-latest.apk` and `version.txt` from this release.
          files: |
            nock-${{ steps.meta.outputs.version }}-build.${{ github.run_number }}.apk
            nock-latest.apk
            version.txt
          generate_release_notes: true
